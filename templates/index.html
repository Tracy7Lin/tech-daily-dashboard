<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>科技巨头每日情报看板</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --bg-accent: #eaf1ff;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: #ffffff;
      --surface-soft: #f7faff;
      --ink: #102033;
      --ink-soft: #4d5b6a;
      --line: rgba(117, 138, 173, 0.22);
      --line-strong: rgba(96, 119, 160, 0.3);
      --brand: #2563eb;
      --brand-soft: rgba(37, 99, 235, 0.12);
      --glow: rgba(37, 99, 235, 0.16);
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI Variable", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 34%),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.14), transparent 26%),
        linear-gradient(180deg, #f9fbff 0%, var(--bg) 55%, #eef3f9 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.4) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.22), transparent 72%);
    }
    a {
      color: var(--brand);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .site-shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 20px 72px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      color: var(--ink-soft);
      font-size: 0.95rem;
    }
    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .brand-mark {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      box-shadow: 0 0 0 8px var(--brand-soft);
    }
    .top-links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .hero {
      position: relative;
      overflow: hidden;
      padding: 34px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.92), rgba(244,248,255,0.88)),
        var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto -10% -25% auto;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow), transparent 68%);
      pointer-events: none;
    }
    .eyebrow {
      margin: 0 0 12px;
      color: var(--brand);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .hero h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(2.2rem, 4vw, 3.5rem);
      line-height: 1.04;
      letter-spacing: -0.04em;
    }
    .hero-copy {
      max-width: 780px;
      margin: 18px 0 0;
      color: var(--ink-soft);
      font-size: 1.06rem;
      line-height: 1.8;
    }
    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }
    .metric-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 600;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.08);
    }
    .metric-label {
      color: var(--ink-soft);
      font-weight: 500;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin: 34px 0 14px;
    }
    .section-title {
      margin: 0;
      font-size: 1.32rem;
      letter-spacing: -0.03em;
    }
    .section-hint {
      margin: 0;
      color: var(--ink-soft);
      font-size: 0.94rem;
    }
    .spotlight-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }
    .stack {
      display: grid;
      gap: 18px;
    }
    .card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: 22px;
    }
    .highlight-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(246,249,255,0.82));
    }
    .card-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .importance-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .card h3,
    .card h4 {
      margin: 0 0 10px;
      line-height: 1.35;
      letter-spacing: -0.02em;
    }
    .section-copy {
      margin: 0 0 12px;
      color: var(--ink-soft);
      line-height: 1.78;
    }
    .meta {
      color: var(--ink-soft);
      font-size: 0.9rem;
    }
    .meta-line {
      margin: 0;
      padding-top: 12px;
      border-top: 1px solid rgba(117, 138, 173, 0.16);
    }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 0;
    }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.12);
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 600;
    }
    .topic-note,
    .supplement {
      margin: 12px 0 0;
      line-height: 1.72;
      color: var(--ink-soft);
    }
    .topic-list-label {
      margin: 14px 0 10px;
    }
    .topic-event-list,
    .company-card ul {
      margin: 0;
      padding-left: 0;
      list-style: none;
    }
    .topic-event {
      padding-top: 12px;
      border-top: 1px solid rgba(117, 138, 173, 0.16);
    }
    .topic-event:first-child {
      padding-top: 0;
      border-top: 0;
    }
    .topic-event-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }
    .inline-link {
      font-weight: 600;
    }
    .company-card .entry {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(117, 138, 173, 0.16);
    }
    .company-card .entry:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }
    .empty {
      color: var(--ink-soft);
    }
    @media (max-width: 720px) {
      .site-shell { padding-inline: 16px; }
      .hero { padding: 24px; }
      .topbar,
      .section-head { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="site-shell">
    <header class="topbar">
      <div class="brand-lockup">
        <span class="brand-mark"></span>
        <span>Tech Daily Dashboard</span>
      </div>
      <nav class="top-links">
        <a href="./$date/index.html">当日详情</a>
        <a href="./archive.html">历史归档</a>
      </nav>
    </header>

    <section class="hero">
      <p class="eyebrow">$date</p>
      <h1>科技巨头每日情报看板</h1>
      <p class="hero-copy">$headline</p>
      <div class="hero-stats">
        <span class="metric-pill"><span class="metric-label">有效新闻</span><strong>$total_entries</strong></span>
        <span class="metric-pill"><span class="metric-label">覆盖公司</span><strong>$companies_covered</strong></span>
        <span class="metric-pill"><span class="metric-label">热门主题</span><strong>$hottest_topics</strong></span>
      </div>
    </section>

    <div class="section-head">
      <div>
        <h2 class="section-title">重点观察</h2>
        <p class="section-hint">先看今天最值得花时间的条目，再决定是否下钻到主题或公司层。</p>
      </div>
    </div>
    <div class="spotlight-grid">$highlights</div>

    <div class="section-head">
      <div>
        <h2 class="section-title">主题对比</h2>
        <p class="section-hint">用主题聚合取代逐条浏览，优先看到不同公司在同一方向上的差异。</p>
      </div>
    </div>
    <div class="grid">$topic_cards</div>

    <div class="section-head">
      <div>
        <h2 class="section-title">公司动态</h2>
        <p class="section-hint">保留按公司回看路径，适合快速检查单家公司当天的完整动作。</p>
      </div>
    </div>
    <div class="grid">$company_cards</div>
  </main>
</body>
</html>
