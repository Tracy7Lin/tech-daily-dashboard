<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>科技巨头日报归档</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: rgba(255, 255, 255, 0.84);
      --ink: #102033;
      --ink-soft: #516173;
      --line: rgba(117, 138, 173, 0.22);
      --brand: #2563eb;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
      --radius-xl: 28px;
      --radius-lg: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI Variable", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 34%),
        linear-gradient(180deg, #f9fbff 0%, var(--bg) 60%, #eef3f9 100%);
    }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .site-shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 20px 72px;
    }
    .page-header,
    .card {
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .page-header {
      padding: 28px 30px;
      margin-bottom: 22px;
    }
    .eyebrow {
      margin: 0 0 12px;
      color: var(--brand);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .page-header h1 {
      margin: 0;
      font-size: clamp(2rem, 3.8vw, 3rem);
      letter-spacing: -0.04em;
    }
    .page-header p {
      margin: 14px 0 0;
      color: var(--ink-soft);
      line-height: 1.72;
    }
    .card {
      padding: 24px;
      border-radius: var(--radius-lg);
    }
    .archive-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .archive-list li {
      padding: 14px 0;
      border-top: 1px solid rgba(117, 138, 173, 0.16);
      color: var(--ink-soft);
      line-height: 1.7;
    }
    .archive-list li:first-child {
      padding-top: 0;
      border-top: 0;
    }
    .archive-list a {
      font-weight: 700;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <main class="site-shell">
    <section class="page-header">
      <p class="eyebrow">Archive</p>
      <h1>历史归档</h1>
      <p>按日期回看过去生成的日报，适合快速检查某一天的核心判断与页面产物。</p>
    </section>
    <section class="card">
      <ul class="archive-list">$archive_items</ul>
    </section>
  </main>
</body>
</html>
